version: '3.8'

services:
  ai-service:
    build:
      context: ./ai-service
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - ai-service

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
